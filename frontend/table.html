<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Table</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/theme-vars.css">
    <link rel="stylesheet" href="/css/cards.css">
    <link rel="stylesheet" href="/css/table.css">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body class="theme-dark">
    <!-- Barre tournoi (haut) -->
    <div id="tournamentInfo" class="tournament-info-bar"></div>

    <div class="poker-room">
        <!-- Zone table -->
        <div class="table-container">
            <!-- Option affichage BB -->
            <div class="stack-display-toggle">
                <label>
                    <input type="checkbox" id="stackDisplayToggle">
                    <span>Afficher en BB</span>
                </label>
            </div>
            
            <div class="poker-table">
                <!-- Deck indicator (état du ring) -->
                <div class="deck-indicator" id="deckIndicator">
                    <div class="deck-stack">
                        <div class="deck-card"></div>
                        <div class="deck-card"></div>
                        <div class="deck-card"></div>
                    </div>
                    <div class="deck-status ok">✓ Deck OK</div>
                </div>
                
                <!-- Cartes communes -->
                <div class="community-cards" id="communityCards">
                    <!-- Les cartes seront ajoutées dynamiquement au fur et à mesure -->
                </div>
                
                <!-- Pot central -->
                <div class="pot" id="pot">
                    <span class="pot-icon">💰</span>
                    Pot: 0
                </div>
                
                <!-- Timer d'action avec barre de progression -->
                <div class="action-timer-container" id="actionTimerContainer">
                    <div class="action-timer-bar">
                        <div class="action-timer-fill"></div>
                    </div>
                    <div class="action-timer-text">20s</div>
                </div>
                
                <!-- Conteneur des joueurs -->
                <div class="players-container" id="playersContainer"></div>
            </div>
        </div>

        <!-- Bannière spectateur -->
        <div id="spectatorBanner" class="spectator-banner" style="display:none">
            👁️ Spectateur — <a href="/lobby" style="color:var(--accent)">Retour au Lobby</a>
        </div>

        <!-- Panneau info (droite) -->
        <div class="info-panel">
            <!-- Infos de jeu -->
            <div class="game-info">
                <div class="info-row">
                    <span class="label">Table:</span>
                    <span id="tableName" class="value">Chargement...</span>
                </div>
                <div class="info-row">
                    <span class="label">Statut:</span>
                    <span id="gameStatus" class="value">En attente</span>
                </div>
                <div class="info-row">
                    <span class="label">Main #:</span>
                    <span id="gameRound" class="value">0</span>
                </div>
                <div class="info-row">
                    <span class="label">Tour:</span>
                    <span id="bettingRound" class="value">Preflop</span>
                </div>
                <div class="info-row">
                    <span class="label">Blinds:</span>
                    <span id="gameBlinds" class="value">?/?</span>
                </div>
                <div class="info-row">
                    <span class="label">Joueurs actifs:</span>
                    <span id="playersAlive" class="value">0</span>
                </div>
            </div>
            
            <!-- Historique des mains -->
            <div class="hand-history">
                <h3>📜 Historique</h3>
                <div class="history-list" id="historyList">
                    <div class="history-empty">
                        <span>Aucune main jouée</span>
                    </div>
                </div>
            </div>
            
            <!-- Chat de table -->
            <div class="table-chat">
                <h3>💬 Chat</h3>
                <div class="table-chat-messages" id="tableChatMessages"></div>
                <div class="table-chat-input">
                    <input type="text" id="tableChatInput" placeholder="Message..." maxlength="200">
                    <button id="tableChatSend">Envoyer</button>
                </div>
            </div>
            
            <!-- Bouton quitter -->
            <button id="leaveBtn" class="leave-btn">🚪 Quitter la table</button>
        </div>
    </div>

    <!-- Panneau d'actions (bas) -->
    <div class="action-panel" id="actionPanel">
        <div class="action-buttons">
            <button id="foldBtn" class="action-btn fold" disabled>Fold (F)</button>
            <button id="checkBtn" class="action-btn check" disabled>Check (C)</button>
            <button id="callBtn" class="action-btn call" style="display:none" disabled>Call (C)</button>
            <button id="raiseBtn" class="action-btn raise" disabled>Raise (R)</button>
        </div>
        
        <div class="raise-slider" id="raiseSlider" style="display:none">
            <input type="range" id="raiseAmount" min="10" max="1000" step="10" value="100">
            <div class="raise-controls">
                <span id="raiseValue">100</span>
                <button id="confirmRaise" class="btn-small">Raise</button>
                <button id="cancelRaise" class="btn-small cancel">Annuler</button>
            </div>
        </div>
        
        <div class="player-info">
            <div id="actionTimer" class="action-timer-display">En attente...</div>
            <div id="playerChips">0 chips</div>
            <div id="playerBet">Mise: 0</div>
        </div>
    </div>

    <!-- Conteneur pour mes cartes (ajouté dynamiquement) -->
    <div id="myCardsContainer" class="my-cards-container hidden"></div>

    <!-- Toast notifications -->
    <div class="toast" id="toast"></div>

    <!-- Scripts -->
    <script src="/js/theme_manager.js"></script>
    <script src="/js/cards.js"></script>
    <script src="/js/timer.js"></script>
    <script src="/js/hand-history.js"></script>
    <script>
        // Variables injectées par le serveur
        window.tableId = "{{ table_id }}";
        window.tableName = "{{ table_name }}";
    </script>
    <script src="/js/table.js"></script>
</body>
</html>
