<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table de Poker — PokerEndPasse</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/table.css">
</head>
<body>

<!-- Barre info tournoi -->
<div id="tournamentInfo" class="tournament-info-bar"></div>

<!-- Bannière spectateur -->
<div id="spectatorBanner" class="spectator-banner" style="display:none">
    👁️ Mode Spectateur —
    <a href="/lobby" style="color:var(--accent)">← Retour Lobby</a>
</div>

<div class="poker-room">

    <!-- ════════ ZONE TABLE ════════ -->
    <div class="table-area">
        <div class="table-wrapper">
            <div class="poker-table" id="pokerTable">
                <div class="players-container" id="playersContainer"></div>
                <div class="center-area">
                    <!-- Deck widget SRA -->
                    <div class="deck-widget" id="deckWidget">
                        <div class="deck-stack">
                            <div class="deck-card dc-3"></div>
                            <div class="deck-card dc-2"></div>
                            <div class="deck-card dc-1"></div>
                        </div>
                        <div class="deck-info">
                            <span id="deckStatus" class="deck-status">🔒</span>
                        </div>
                    </div>
                    <!-- Community cards -->
                    <div class="community-cards" id="communityCards"></div>
                    <!-- Pot -->
                    <div class="pot-display" id="potDisplay">Pot: 0</div>
                </div>
            </div>
        </div>

        <!-- ════════ ACTIONS ════════ -->
        <div class="action-bar" id="actionBar">
            <!-- Quick Bets -->
            <div class="quick-bets" id="quickBets" style="display:none">
                <button class="qb-btn" data-key="1bb">1 BB</button>
                <button class="qb-btn" data-key="2bb">2 BB</button>
                <button class="qb-btn" data-key="1_3pot">1/3</button>
                <button class="qb-btn" data-key="1_2pot">1/2</button>
                <button class="qb-btn" data-key="3_4pot">3/4</button>
                <button class="qb-btn" data-key="pot">Pot</button>
                <button class="qb-btn qb-allin" data-key="allin">All-in</button>
            </div>

            <div class="main-actions">
                <button id="foldBtn" class="action-btn fold" disabled>Fold (F)</button>
                <button id="checkBtn" class="action-btn check" disabled>Check (C)</button>
                <button id="callBtn" class="action-btn call" style="display:none" disabled>Call (C)</button>
                <button id="raiseBtn" class="action-btn raise" disabled>Raise (R)</button>
            </div>

            <div class="raise-slider" id="raiseSlider" style="display:none">
                <input type="range" id="raiseAmount" min="10" max="1000" step="10" value="100">
                <div class="raise-controls">
                    <input type="number" id="raiseValue" class="raise-input" value="100" min="10">
                    <button id="confirmRaise" class="btn-small">Raise</button>
                    <button id="cancelRaise" class="btn-small cancel">Annuler</button>
                </div>
            </div>

            <div class="player-info">
                <div id="actionTimer" class="action-timer-display">En attente…</div>
                <div id="playerChips">0 chips</div>
                <div id="playerBet">Mise: 0</div>
            </div>
        </div>
    </div>

    <!-- ════════ PANNEAU DROIT ════════ -->
    <div class="right-panel">
        <!-- Infos de jeu -->
        <div class="game-info-panel">
            <div class="gi-title">📊 Infos</div>
            <div class="info-row"><span class="label">Main</span><span id="handNumber" class="value">#0</span></div>
            <div class="info-row"><span class="label">Variante</span><span id="gameVariant" class="value">Hold'em</span></div>
            <div class="info-row"><span class="label">Street</span><span id="bettingRound" class="value">Preflop</span></div>
            <div class="info-row"><span class="label">Blinds</span><span id="gameBlinds" class="value">—/—</span></div>
            <div class="info-row"><span class="label">Joueurs</span><span id="playersAlive" class="value">0</span></div>
            <div class="info-row"><span class="label">Mes chips</span><span id="myChipsInfo" class="value">—</span></div>
        </div>

        <!-- Options rapides -->
        <div class="quick-options">
            <label class="toggle-label">
                <input type="checkbox" id="stackDisplayToggle">
                <span>Afficher en BB</span>
            </label>
            <button id="themeToggleBtn" class="btn-small">🎨 Thème</button>
        </div>

        <!-- Historique -->
        <div class="hand-history-panel">
            <div class="gi-title">📋 Historique</div>
            <div class="history-list" id="historyList">
                <div class="hh-empty">Aucune main jouée</div>
            </div>
        </div>

        <!-- Chat -->
        <div class="table-chat">
            <div class="gi-title">💬 Chat</div>
            <div class="tchat-messages" id="tableChatMessages">
                <div class="tchat-msg tchat-system"><i>Chat actif</i></div>
            </div>
            <div class="tchat-input">
                <input type="text" id="tableChatInput" placeholder="Message…" disabled maxlength="200">
                <button id="tableChatSend" disabled>→</button>
            </div>
        </div>
    </div>

</div>

<!-- My cards overlay -->
<div id="myCardsContainer" class="my-cards-container hidden"></div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Theme picker modal -->
<div id="themeModal" class="modal" style="display:none">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>🎨 Personnalisation</h2>
        <div class="form-group">
            <label>Thème :</label>
            <select id="themeSelect">
                <option value="dark">Sombre (défaut)</option>
                <option value="light">Clair</option>
                <option value="neon">Néon</option>
                <option value="blue">Bleu</option>
                <option value="red">Rouge</option>
            </select>
        </div>
        <div class="form-group">
            <label>Jeu de cartes :</label>
            <select id="cardDeckSelect">
                <option value="standard">Standard</option>
                <option value="fourcolor">4 couleurs</option>
                <option value="classic">Classique</option>
                <option value="minimal">Minimal</option>
            </select>
        </div>
        <div class="form-group">
            <label>Table :</label>
            <select id="tableStyleSelect">
                <option value="felt">Feutre vert</option>
                <option value="blue-felt">Feutre bleu</option>
                <option value="wood">Bois</option>
                <option value="dark">Sombre</option>
            </select>
        </div>
        <button id="applyTheme" class="btn-primary">Appliquer</button>
    </div>
</div>

<script src="/js/settings_manager.js"></script>
<script src="/js/sound_manager.js"></script>
<script src="/js/theme_manager.js"></script>
<script src="/js/cards.js"></script>
<script src="/js/timer.js"></script>
<script src="/js/hand_history.js"></script>
<script>
    window.tableId = "{{ table_id }}";
    window.tableName = "{{ table_name }}";
</script>
<script src="/js/table.js"></script>

</body>
</html>
