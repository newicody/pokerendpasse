<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Poker Game</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .profile-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #ffd700;
        }
        
        .profile-header h1 {
            font-size: 32px;
            color: #ffd700;
        }
        
        .back-link {
            color: #ffd700;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
        }
        
        .profile-content {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        
        .profile-sidebar {
            flex: 1;
            min-width: 250px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }
        
        .avatar-section {
            margin-bottom: 20px;
        }
        
        .avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 3px solid #ffd700;
            object-fit: cover;
        }
        
        .chips-display {
            font-size: 20px;
            color: #ffd700;
            margin-top: 10px;
        }
        
        .avatar-selector {
            margin-top: 20px;
        }
        
        .avatar-selector h3 {
            color: #ffd700;
            margin-bottom: 10px;
        }
        
        .avatar-options {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .avatar-option {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        
        .avatar-option img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .avatar-option.selected {
            border-color: #ffd700;
            transform: scale(1.1);
        }
        
        .avatar-option:hover {
            transform: scale(1.05);
        }
        
        .profile-main {
            flex: 2;
            min-width: 400px;
        }
        
        .profile-section {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .profile-section h3 {
            color: #ffd700;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .form-group input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            color: white;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        
        .stat {
            text-align: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
        }
        
        .btn-primary, .btn-secondary, .btn-danger {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            color: #1a472a;
        }
        
        .btn-secondary {
            background: #3498db;
            color: white;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
        }
        
        .modal-content {
            background: linear-gradient(135deg, #2c3e50, #1a2a3a);
            margin: 100px auto;
            padding: 30px;
            width: 400px;
            max-width: 90%;
            border-radius: 16px;
            position: relative;
        }
        
        .modal-content .close {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 24px;
            cursor: pointer;
            color: white;
        }
        
        .modal-content .close:hover {
            color: #ffd700;
        }
        
        @media (max-width: 768px) {
            .profile-content {
                flex-direction: column;
            }
            .profile-main {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="profile-header">
            <h1>👤 My Profile</h1>
            <a href="/lobby" class="back-link">← Back to Lobby</a>
        </div>
        
        <div class="profile-content">
            <div class="profile-sidebar">
                <div class="avatar-section">
                    <img id="avatarImg" class="avatar-large" src="/assets/images/avatars/default.svg" alt="Avatar">
                    <h2 id="username">Loading...</h2>
<!-- Dans la section avatar, ajouter un bouton d'upload -->
<div class="avatar-upload">
    <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
    <button id="uploadAvatarBtn" class="btn-small">Upload Custom Avatar</button>
</div>                    <div class="chips-display">
                        <span class="chips-icon">💰</span>
                        <span id="chips">0</span> chips
                    </div>
                </div>
                
                <div class="avatar-selector">
                    <h3>Choose Avatar</h3>
                    <div class="avatar-options">
                        <div class="avatar-option" data-avatar="default">
                            <img src="/assets/images/avatars/default.svg">
                        </div>
                        <div class="avatar-option" data-avatar="panda">
                            <img src="/assets/images/avatars/panda.svg">
                        </div>
                        <div class="avatar-option" data-avatar="tiger">
                            <img src="/assets/images/avatars/tiger.svg">
                        </div>
                        <div class="avatar-option" data-avatar="dragon">
                            <img src="/assets/images/avatars/dragon.svg">
                        </div>
                        <div class="avatar-option" data-avatar="phoenix">
                            <img src="/assets/images/avatars/phoenix.svg">
                        </div>
                    </div>
                    <input type="hidden" id="selectedAvatar" value="default">
                </div>
            </div>
            
            <div class="profile-main">
                <div class="profile-section">
                    <h3>Personal Information</h3>
                    <div class="form-group">
                        <label>Email:</label>
                        <input type="email" id="email" placeholder="your@email.com">
                    </div>
                    <button id="saveProfile" class="btn-primary">Save Changes</button>
                </div>
                
                <div class="profile-section">
                    <h3>Statistics</h3>
                    <div class="stats-grid">
                        <div class="stat">
                            <div class="stat-value" id="handsPlayed">0</div>
                            <div class="stat-label">Hands Played</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="handsWon">0</div>
                            <div class="stat-label">Hands Won</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="winRate">0%</div>
                            <div class="stat-label">Win Rate</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="totalWinnings">0</div>
                            <div class="stat-label">Total Winnings</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="biggestPot">0</div>
                            <div class="stat-label">Biggest Pot</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="bestHand">-</div>
                            <div class="stat-label">Best Hand</div>
                        </div>
                    </div>
                </div>
                
                <div class="profile-section">
                    <h3>Security</h3>
                    <button id="changePasswordBtn" class="btn-secondary">Change Password</button>
                    <button id="logoutBtn" class="btn-danger">Logout</button>
                </div>

<!-- Chat Settings Modal -->
                <div class="profile-section">

<div id="chatSettingsModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Chat Settings</h2>
        <div class="form-group">
            <label>
                <input type="checkbox" id="hideJoinMessages"> Hide join/leave messages
            </label>
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" id="autoConvertSmileys" checked> Auto-convert smileys (:) -> 😊)
            </label>
        </div>
        <button id="saveChatSettings" class="btn-primary">Save Settings</button>
    </div>
</div>
</div>
<script>
document.getElementById('saveChatSettings')?.addEventListener('click', () => {
    chatManager.saveSettingsModal();
});
</script>


            </div>
        </div>
        
        <!-- Change Password Modal -->
        <div id="changePasswordModal" class="modal">
            <div class="modal-content">
                <span class="close" id="closeModal">&times;</span>
                <h2>Change Password</h2>
                <form id="changePasswordForm">
                    <div class="form-group">
                        <label>Current Password:</label>
                        <input type="password" id="currentPassword" required>
                    </div>
                    <div class="form-group">
                        <label>New Password:</label>
                        <input type="password" id="newPassword" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password:</label>
                        <input type="password" id="confirmPassword" required>
                    </div>
                    <button type="button" id="submitPasswordChange" class="btn-primary">Change Password</button>
                </form>
            </div>
        </div>
    </div>
    
    <script src="/js/profile.js"></script>
</body>
</html>
