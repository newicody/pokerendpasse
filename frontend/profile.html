<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Profile</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .profile-container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
        }
        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .profile-header h1 { color: #ffd700; margin: 0; }
        .profile-header .nav-links a,
        .profile-header button {
            margin-left: 10px;
            padding: 8px 16px;
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
        }
        .profile-content {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .profile-sidebar {
            flex: 1;
            min-width: 250px;
        }
        .avatar-section {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #ffd700;
            object-fit: cover;
            margin-bottom: 10px;
        }
        .avatar-upload {
            margin-top: 10px;
        }
        .avatar-selector {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            padding: 20px;
        }
        .avatar-selector h3 {
            color: #ffd700;
            margin-bottom: 10px;
        }
        .avatar-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .avatar-option {
            width: 50px; height: 50px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .avatar-option img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .avatar-option.selected {
            border-color: #ffd700;
            transform: scale(1.1);
        }
        .avatar-option:hover { transform: scale(1.05); }
        .profile-main {
            flex: 2;
            min-width: 400px;
        }
        .profile-section {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .profile-section h3 {
            color: #ffd700;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: rgba(255, 255, 255, 0.8);
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ffd700;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        .stat {
            text-align: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 5px;
        }
        .profile-container .btn-primary {
            padding: 10px 20px;
            background: #ffd700;
            color: #1a472a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .profile-container .btn-primary:hover { background: #ffb347; }
        .profile-container .btn-small {
            padding: 6px 12px;
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .profile-container .btn-danger {
            padding: 10px 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .profile-container .btn-danger:hover { background: #c0392b; }
        .profile-container .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .profile-container .modal-content {
            background: #1a472a;
            padding: 30px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        .profile-container .modal .close {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #ffd700;
        }
        @media (max-width: 768px) {
            .profile-content { flex-direction: column; }
            .profile-main { min-width: auto; }
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <!-- Header -->
        <div class="profile-header">
            <h1>👤 My Profile</h1>
            <div class="nav-links">
                <a href="/lobby">← Back to Lobby</a>
                <button id="logoutBtn" class="btn-danger">Logout</button>
            </div>
        </div>

        <!-- Content -->
        <div class="profile-content">
            <div class="profile-sidebar">
                <div class="avatar-section">
                    <img id="avatarImg" class="avatar-large" src="/assets/images/avatars/default.svg" alt="Avatar">
                    <h2 id="username">Loading...</h2>
                    <div class="avatar-upload">
                        <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
                        <button id="uploadAvatarBtn" class="btn-small">📷 Upload Custom Avatar</button>
                    </div>
                </div>

                <div class="avatar-selector">
                    <h3>Choose Avatar</h3>
                    <div class="avatar-options">
                        <div class="avatar-option" data-avatar="default"><img src="/assets/images/avatars/default.svg"></div>
                        <div class="avatar-option" data-avatar="panda"><img src="/assets/images/avatars/panda.svg"></div>
                        <div class="avatar-option" data-avatar="tiger"><img src="/assets/images/avatars/tiger.svg"></div>
                        <div class="avatar-option" data-avatar="dragon"><img src="/assets/images/avatars/dragon.svg"></div>
                        <div class="avatar-option" data-avatar="phoenix"><img src="/assets/images/avatars/phoenix.svg"></div>
                    </div>
                    <input type="hidden" id="selectedAvatar" value="default">
                </div>
            </div>

            <div class="profile-main">
                <div class="profile-section">
                    <h3>Personal Information</h3>
                    <div class="form-group">
                        <label>Email:</label>
                        <input type="email" id="email" placeholder="your@email.com">
                    </div>
                    <button id="saveProfile" class="btn-primary">💾 Save Profile</button>
                </div>

                <div class="profile-section">
                    <h3>Security</h3>
                    <button id="changePasswordBtn" class="btn-primary">🔒 Change Password</button>
                </div>

                <div class="profile-section">
                    <h3>Statistics</h3>
                    <div class="stats-grid">
                        <div class="stat"><div class="stat-value" id="statTournaments">0</div><div class="stat-label">Tournaments</div></div>
                        <div class="stat"><div class="stat-value" id="statWins">0</div><div class="stat-label">Wins</div></div>
                        <div class="stat"><div class="stat-value" id="statHands">0</div><div class="stat-label">Hands Played</div></div>
                        <div class="stat"><div class="stat-value" id="statBestFinish">-</div><div class="stat-label">Best Finish</div></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Change Password Modal -->
        <div id="changePasswordModal" class="modal">
            <div class="modal-content">
                <span class="close" id="closePasswordModal">&times;</span>
                <h2>Change Password</h2>
                <div class="form-group">
                    <label>Current Password:</label>
                    <input type="password" id="currentPassword" required>
                </div>
                <div class="form-group">
                    <label>New Password:</label>
                    <input type="password" id="newPassword" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password:</label>
                    <input type="password" id="confirmPassword" required>
                </div>
                <button type="button" id="submitPasswordChange" class="btn-primary">Change Password</button>
            </div>
        </div>
    </div>

    <script src="/js/profile.js"></script>
</body>
</html>
