<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table de Poker — PokerEndPasse</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/table.css">
</head>
<body>

<!-- Barre info tournoi (en haut) -->
<div id="tournamentInfo" class="tournament-info-bar"></div>

<!-- Bannière spectateur -->
<div id="spectatorBanner" class="spectator-banner" style="display:none">
    👁️ Mode Spectateur —
    <a href="/lobby" style="color:var(--accent)">← Retour Lobby</a>
</div>

<!-- ══════════════════════════════════════════════════════════════════════
     LAYOUT PRINCIPAL
     ═══════════════════════════════════════════════════════════════════ -->
<div class="poker-room">

    <!-- ════════════ ZONE TABLE (gauche) ════════════ -->
    <div class="table-area">

        <!-- Enveloppe la table avec assez d'espace pour les sièges extérieurs -->
        <div class="table-wrapper">
            <div class="poker-table" id="pokerTable">

                <!-- Joueurs (positionnés autour et en dehors de l'ovale) -->
                <div class="players-container" id="playersContainer"></div>

                <!-- Zone centrale : deck widget + community cards -->
                <div class="center-area">

                    <!-- Widget Deck / Ring SRA -->
                    <div class="deck-widget" id="deckWidget">
                        <div class="deck-stack">
                            <div class="deck-card dc-3"></div>
                            <div class="deck-card dc-2"></div>
                            <div class="deck-card dc-1"></div>
                        </div>
                        <div id="ringStatus" class="ring-status">⚪ Ring: Prêt</div>
                    </div>

                    <!-- Cartes community (révélées progressivement par le JS) -->
                    <div class="community-cards" id="communityCards"></div>

                </div>

                <!-- Pot -->
                <div class="pot" id="pot" style="display:none">Pot: 0</div>

            </div>
        </div>

        <!-- ── Mes grandes cartes (bas-centre, sous la table) ── -->
        <div class="my-cards-display" id="myCardsDisplay" style="display:none">
            <div class="my-cards-label">Vos cartes</div>
            <div class="my-cards-inner" id="myCardsInner"></div>
        </div>

        <!-- ── Panel d'action ── -->
        <div class="action-panel" id="actionPanel" style="display:none">
            <div class="action-buttons">
                <button id="foldBtn"  class="action-btn btn-fold">Fold <kbd>F</kbd></button>
                <button id="checkBtn" class="action-btn btn-check">Check <kbd>C</kbd></button>
                <button id="callBtn"  class="action-btn btn-call" style="display:none">Call <kbd>C</kbd></button>
                <button id="raiseBtn" class="action-btn btn-raise">Raise <kbd>R</kbd></button>
            </div>
            <div class="raise-slider" id="raiseSlider" style="display:none">
                <input type="range" id="raiseAmount" min="10" max="10000" step="10" value="100">
                <div class="raise-controls">
                    <span class="raise-label">Raise:</span>
                    <span id="raiseValue">100</span>
                    <button id="confirmRaise" class="btn-small btn-ok">✓ Raise</button>
                    <button id="cancelRaise"  class="btn-small btn-cancel">✕</button>
                </div>
            </div>
            <div class="player-hud">
                <div id="actionTimer" class="action-timer-display"></div>
                <div id="playerChips" class="player-chips-hud">— chips</div>
            </div>
        </div>

        <!-- ── Barre d'options rapides ── -->
        <div class="options-bar">
            <label class="opt-toggle">
                <input type="checkbox" id="bbDisplay">
                Stack en BB
            </label>
            <div class="opt-theme">
                <label for="themeSelect">🎨</label>
                <select id="themeSelect" title="Changer de thème"></select>
            </div>
            <button class="leave-btn" id="leaveTableBtn">🚪 Quitter</button>
        </div>

    </div><!-- /.table-area -->

    <!-- ════════════ PANEL DROIT ════════════ -->
    <div class="right-panel">

        <!-- Infos de la partie -->
        <div class="game-info-panel">
            <div class="gi-title">🃏 Info Table</div>
            <div class="info-row"><span class="label">Table</span><span id="tableName" class="value">…</span></div>
            <div class="info-row"><span class="label">Status</span><span id="gameStatus" class="value">Attente</span></div>
            <div class="info-row"><span class="label">Main</span><span id="gameRound" class="value">0</span></div>
            <div class="info-row"><span class="label">Street</span><span id="bettingRound" class="value">Preflop</span></div>
            <div class="info-row"><span class="label">Blinds</span><span id="gameBlinds" class="value">—/—</span></div>
            <div class="info-row"><span class="label">Joueurs</span><span id="playersAlive" class="value">0</span></div>
            <div class="info-row"><span class="label">Mes chips</span><span id="playerChips" class="value">—</span></div>
        </div>

        <!-- Historique des mains -->
        <div class="hand-history-panel">
            <div class="gi-title">📋 Historique des mains</div>
            <div class="history-list" id="historyList">
                <div class="hh-empty">Aucune main jouée</div>
            </div>
        </div>

        <!-- Chat de table -->
        <div class="table-chat">
            <div class="gi-title">💬 Chat Table</div>
            <div class="tchat-messages" id="tableChatMessages">
                <div class="tchat-msg tchat-system"><i>Chat actif</i></div>
            </div>
            <div class="tchat-input">
                <input type="text" id="tableChatInput" placeholder="Message…" disabled maxlength="200">
                <button id="tableChatSend" disabled>→</button>
            </div>
        </div>

    </div><!-- /.right-panel -->

</div><!-- /.poker-room -->

<!-- Toast notifications -->
<div id="toast" class="toast"></div>

<!-- Scripts : ordre important (dépendances d'abord) -->
<script src="/js/theme_manager.js"></script>
<script src="/js/cards.js"></script>
<script src="/js/hand_history.js"></script>
<script src="/js/table.js"></script>

</body>
</html>
