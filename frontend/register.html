<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Poker Game</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .register-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a472a 0%, #0e2a1a 100%);
            padding: 20px;
        }
        
        .register-card {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .register-header h1 {
            font-size: 32px;
            color: #ffd700;
            margin-bottom: 10px;
        }
        
        .register-header p {
            color: rgba(255, 255, 255, 0.7);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ffd700;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #ffd700;
            background: rgba(255, 255, 255, 0.15);
        }
        
        .password-strength {
            margin-top: 8px;
            font-size: 12px;
        }
        
        .strength-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }
        
        .strength-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        
        .strength-text {
            margin-top: 5px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .register-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ffd700, #ffb347);
            color: #1a472a;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .register-btn:hover {
            transform: translateY(-2px);
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .login-link a {
            color: #ffd700;
            text-decoration: none;
            font-weight: bold;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .back-link {
            text-align: center;
            margin-top: 15px;
        }
        
        .back-link a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link a:hover {
            color: #ffd700;
        }
        
        .error-message {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 20px;
            color: #e74c3c;
            text-align: center;
            display: none;
        }
        
        .success-message {
            background: rgba(39, 174, 96, 0.2);
            border: 1px solid #27ae60;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 20px;
            color: #27ae60;
            text-align: center;
            display: none;
        }
        
        .terms {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .terms input {
            width: 18px;
            height: 18px;
            margin-top: 2px;
        }
        
        .terms label {
            margin: 0;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
        }
        
        .terms a {
            color: #ffd700;
            text-decoration: none;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #1a472a;
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <h1>🃏 Create Account ♠️</h1>
                <p>Join the poker community and start playing</p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>Username *</label>
                    <input type="text" id="username" placeholder="Choose a username" required autocomplete="username">
                    <small style="color: rgba(255,255,255,0.5); font-size: 12px;">3-20 characters, letters and numbers only</small>
                </div>
                
                <div class="form-group">
                    <label>Email (optional)</label>
                    <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" id="password" placeholder="Create a password" required autocomplete="new-password">
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <div class="strength-text" id="strengthText"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                </div>
                
                <div class="terms">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        I agree to the <a href="#" onclick="return false;">Terms of Service</a> and 
                        <a href="#" onclick="return false;">Privacy Policy</a>
                    </label>
                </div>
                
                <button type="submit" class="register-btn" id="registerBtn">Create Account</button>
            </form>
            
            <div class="login-link">
                Already have an account? <a href="/login">Login here</a>
            </div>
            
            <div class="back-link">
                <a href="/lobby">← Back to Lobby</a>
            </div>
        </div>
    </div>
    
    <script>
        const registerForm = document.getElementById('registerForm');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const registerBtn = document.getElementById('registerBtn');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');
        
        // Password strength checker
        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            let strength = 0;
            let message = '';
            let color = '';
            
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            
            switch(strength) {
                case 0:
                case 1:
                    message = 'Weak';
                    color = '#e74c3c';
                    strengthFill.style.width = '25%';
                    break;
                case 2:
                    message = 'Fair';
                    color = '#f39c12';
                    strengthFill.style.width = '50%';
                    break;
                case 3:
                    message = 'Good';
                    color = '#27ae60';
                    strengthFill.style.width = '75%';
                    break;
                case 4:
                    message = 'Strong';
                    color = '#2ecc71';
                    strengthFill.style.width = '100%';
                    break;
            }
            
            if (password.length === 0) {
                message = '';
                strengthFill.style.width = '0%';
            }
            
            strengthFill.style.backgroundColor = color;
            strengthText.textContent = message;
        });
        
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;
            
            // Validation
            if (!username || !password) {
                showError('Please fill in all required fields');
                return;
            }
            
            if (username.length < 3 || username.length > 20) {
                showError('Username must be between 3 and 20 characters');
                return;
            }
            
            if (!/^[a-zA-Z0-9]+$/.test(username)) {
                showError('Username can only contain letters and numbers');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            
            if (!terms) {
                showError('You must agree to the Terms of Service');
                return;
            }
            
            // Désactiver le bouton
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<span class="loading"></span> Creating account...';
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, email: email || null })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showSuccess('Account created successfully! Redirecting to login...');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    showError(data.detail || 'Registration failed. Username may already exist.');
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = 'Create Account';
                }
            } catch (error) {
                console.error('Registration error:', error);
                showError('Network error. Please try again.');
                registerBtn.disabled = false;
                registerBtn.innerHTML = 'Create Account';
            }
        });
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }
        
        // Vérifier si déjà connecté
        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/me');
                if (response.ok) {
                    window.location.href = '/lobby';
                }
            } catch (error) {
                // Not logged in, stay on page
            }
        }
        
        checkAuth();
    </script>
</body>
</html>
