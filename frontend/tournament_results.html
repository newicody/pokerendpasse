<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultats — PokerEndPasse</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .results-container { max-width: 800px; margin: 0 auto; padding: 30px 20px; }
        .results-header { text-align: center; margin-bottom: 30px; }
        .results-header h1 { color: var(--accent); font-size: 28px; margin-bottom: 8px; }
        .results-header .meta { color: var(--text-secondary); font-size: 14px; }
        .results-header .meta span { margin: 0 10px; }
        .podium { display: flex; justify-content: center; gap: 20px; margin: 30px 0; align-items: flex-end; }
        .podium-slot { text-align: center; padding: 16px; border-radius: 12px; background: var(--bg-tertiary); border: 1px solid var(--border-subtle); min-width: 120px; }
        .podium-slot.first { border-color: gold; order: 2; transform: scale(1.1); }
        .podium-slot.second { border-color: silver; order: 1; }
        .podium-slot.third { border-color: #cd7f32; order: 3; }
        .podium-rank { font-size: 32px; margin-bottom: 4px; }
        .podium-name { font-size: 16px; font-weight: bold; color: var(--text-primary); }
        .podium-prize { font-size: 13px; color: var(--accent); margin-top: 4px; }
        .ranking-table { width: 100%; border-collapse: collapse; margin-top: 24px; }
        .ranking-table th, .ranking-table td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border-subtle); font-size: 13px; }
        .ranking-table th { color: var(--text-muted); font-weight: 600; font-size: 12px; text-transform: uppercase; }
        .ranking-table tr:hover { background: rgba(255,255,255,0.03); }
        .rank-badge { display: inline-block; width: 28px; height: 28px; line-height: 28px; text-align: center; border-radius: 50%; font-weight: bold; font-size: 12px; }
        .rank-1 { background: linear-gradient(135deg, gold, #b8860b); color: #1a1a1a; }
        .rank-2 { background: linear-gradient(135deg, silver, #888); color: #1a1a1a; }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #8b4513); color: #fff; }
        .rank-other { background: var(--bg-secondary); color: var(--text-secondary); }
        .status-active { color: var(--success); }
        .status-eliminated { color: var(--text-muted); }
        .back-link { display: inline-block; margin-top: 24px; }
    </style>
</head>
<body>
    <div class="results-container">
        <div class="results-header">
            <h1 id="tournamentName">🏆 Résultats du Tournoi</h1>
            <div class="meta">
                <span id="tournamentVariant"></span>
                <span id="tournamentPlayers"></span>
                <span id="tournamentPrize"></span>
                <span id="tournamentStatus"></span>
            </div>
        </div>

        <div id="podium" class="podium"></div>

        <h2 style="color:var(--text-secondary);font-size:16px;margin-top:30px">Classement complet</h2>
        <table class="ranking-table">
            <thead>
                <tr><th>#</th><th>Joueur</th><th>Status</th><th>Chips</th></tr>
            </thead>
            <tbody id="rankingBody"></tbody>
        </table>

        <a href="/lobby" class="btn-secondary back-link">← Retour au Lobby</a>
    </div>

    <script>
        const tournamentId = "{{ tournament_id }}";

        async function loadResults() {
            try {
                const resp = await fetch(`/api/tournaments/${tournamentId}/results`);
                if (!resp.ok) { document.body.innerHTML = '<h1 style="text-align:center;padding:40px">Tournoi introuvable</h1>'; return; }
                const data = await resp.json();
                render(data);
            } catch (e) {
                console.error(e);
            }
        }

        function render(data) {
            document.getElementById('tournamentName').textContent = `🏆 ${data.name}`;
            document.getElementById('tournamentVariant').textContent = data.game_variant === 'plo' ? 'PLO' : "Hold'em";
            document.getElementById('tournamentPlayers').textContent = `${data.players_count} joueurs`;
            document.getElementById('tournamentPrize').textContent = data.prize_pool > 0 ? `💰 ${data.prize_pool}` : '🆓 Freeroll';
            document.getElementById('tournamentStatus').textContent = data.status === 'finished' ? '✅ Terminé' : `⏳ ${data.status}`;

            // Podium
            const ranking = data.ranking || [];
            const podiumEl = document.getElementById('podium');
            const top3 = ranking.slice(0, 3);
            const medals = ['🥇', '🥈', '🥉'];
            const classes = ['first', 'second', 'third'];

            podiumEl.innerHTML = top3.map((p, i) => `
                <div class="podium-slot ${classes[i]}">
                    <div class="podium-rank">${medals[i]}</div>
                    <div class="podium-name">${esc(p.username)}</div>
                    <div class="podium-prize">${p.chips > 0 ? p.chips.toLocaleString() + ' chips' : (p.eliminated_rank > 0 ? '#' + p.eliminated_rank : '')}</div>
                </div>
            `).join('');

            // Full ranking
            const tbody = document.getElementById('rankingBody');
            tbody.innerHTML = ranking.map((p, i) => {
                const rank = i + 1;
                const rankClass = rank <= 3 ? `rank-${rank}` : 'rank-other';
                const statusClass = p.status === 'registered' ? 'status-active' : 'status-eliminated';
                return `<tr>
                    <td><span class="rank-badge ${rankClass}">${rank}</span></td>
                    <td>${esc(p.username)}</td>
                    <td class="${statusClass}">${p.status === 'registered' ? 'En jeu' : 'Éliminé'}</td>
                    <td>${p.chips > 0 ? p.chips.toLocaleString() : '—'}</td>
                </tr>`;
            }).join('');
        }

        function esc(t) { const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }

        loadResults();
        // Rafraîchir si le tournoi est en cours
        setInterval(() => { loadResults(); }, 15000);
    </script>
</body>
</html>
