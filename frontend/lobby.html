<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby — PokerEndPasse</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/lobby.css">
</head>
<body>
    <div class="lobby-container">
        <!-- Header -->
        <header class="lobby-header">
            <div class="logo">♠ PokerEndPasse</div>
            <nav class="header-nav">
                <span id="userDisplay" class="user-info"></span>
                <span id="localTime" class="local-time"></span>
                <button id="optionsBtn" class="btn-small">⚙️ Options</button>
                <button id="loginBtn" class="btn-secondary">Connexion</button>
                <button id="registerBtn" class="btn-secondary">Inscription</button>
                <button id="logoutBtn" class="btn-small" style="display:none">Déconnexion</button>
            </nav>
        </header>

        <!-- Main content -->
        <div class="lobby-main">
            <!-- Tournaments -->
            <section class="lobby-section">
                <h2>🏆 Tournois</h2>
                <div id="tournamentsList" class="tournaments-grid">
                    <div class="loading">Chargement…</div>
                </div>
            </section>

            <!-- Tables -->
            <section class="lobby-section">
                <h2>🃏 Tables actives</h2>
                <div id="tablesList" class="tables-grid">
                    <div class="loading">Chargement…</div>
                </div>
            </section>
        </div>

        <!-- Chat sidebar -->
        <aside class="lobby-chat">
            <div class="chat-header">
                💬 Chat Lobby
                <button id="chatSettingsBtn" class="btn-small">⚙️</button>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <button id="smileyBtn" class="smiley-btn">😊</button>
                <div id="smileyDropdown" class="smiley-dropdown"></div>
                <input type="text" id="chatInput" placeholder="Message…" disabled maxlength="200">
                <button id="chatSend" disabled>→</button>
            </div>
        </aside>

        <!-- Options Modal (unified) -->
        <div id="optionsModal" class="modal" style="display:none">
            <div class="modal-content" style="max-width: 800px; max-height: 80vh; overflow-y: auto;">
                <span class="close">&times;</span>
                <h2>⚙️ Options</h2>
                <div class="options-tabs">
                    <button class="options-tab active" data-tab="profile">👤 Profil</button>
                    <button class="options-tab" data-tab="game">🎮 Jeu</button>
                    <button class="options-tab" data-tab="sound">🔊 Son</button>
                    <button class="options-tab" data-tab="chat">💬 Chat</button>
                    <button class="options-tab" data-tab="network">🌐 Réseau</button>
                    <button class="options-tab" data-tab="history">📜 Historique</button>
                    <button class="options-tab" id="adminTabBtn" data-tab="admin" style="display:none">🔧 Admin</button>
                </div>

                <!-- Onglet Profil -->
                <div id="profileTab" class="options-tab-content active">
                    <div style="text-align:center;margin-bottom:16px">
                        <img id="profileAvatar" src="/assets/avatars/default.svg" style="width:80px;height:80px;border-radius:50%;border:3px solid var(--accent);object-fit:cover">
                    </div>
                    <div class="form-group">
                        <label>Pseudo :</label>
                        <input type="text" id="profileUsername" readonly style="background:#333; color:#aaa;">
                    </div>
                    <div class="form-group">
                        <label>Email :</label>
                        <input type="email" id="profileEmail">
                        <button id="updateEmailBtn" class="btn-small" style="margin-top:4px">Mettre à jour</button>
                    </div>
                    <div class="form-group">
                        <label>Changer d'avatar :</label>
                        <input type="file" id="avatarUpload" accept="image/jpeg,image/png,image/gif,image/webp">
                        <small style="color:var(--text-muted)">Max 2 Mo — JPG, PNG, GIF, WebP</small>
                        <button id="uploadAvatarBtn" class="btn-primary" style="margin-top:8px">Sauvegarder l'avatar</button>
                    </div>
                    <div id="uploadStatus" style="margin-top:8px"></div>
                    <hr style="margin:20px 0">
                    <div class="form-group">
                        <label>Changer le mot de passe :</label>
                        <input type="password" id="oldPassword" placeholder="Ancien mot de passe">
                        <input type="password" id="newPassword" placeholder="Nouveau mot de passe">
                        <button id="changePasswordBtn" class="btn-small" style="margin-top:4px">Changer</button>
                    </div>
                </div>

                <!-- Onglet Jeu -->
                <div id="gameTab" class="options-tab-content">
                    <h3>🎨 Apparence</h3>
                    <div class="form-group"><label>Thème :</label><select id="themeSelect"><option value="dark">Sombre</option><option value="light">Clair</option><option value="neon">Néon</option><option value="blue">Bleu</option><option value="red">Rouge</option></select></div>
                    <div class="form-group"><label>Jeu de cartes :</label><select id="cardDeckSelect"><option value="standard">Standard</option><option value="fourcolor">4 couleurs</option><option value="classic">Classique</option><option value="minimal">Minimal</option></select></div>
                    <div class="form-group"><label>Style de table :</label><select id="tableStyleSelect"><option value="felt">Feutre vert</option><option value="blue-felt">Feutre bleu</option><option value="wood">Bois</option><option value="dark">Sombre</option></select></div>

                    <h3>🎮 Comportement</h3>
                    <div class="form-group"><label>Vitesse animation :</label><select id="animationSpeed"><option value="fast">Rapide</option><option value="normal">Normal</option><option value="slow">Lent</option></select></div>
                    <div class="form-group"><label>Action auto :</label><select id="autoAction"><option value="never">Jamais</option><option value="check_fold">Check/Fold</option></select></div>
                    <div class="form-group"><label>Timer d'action (secondes) :</label><input type="number" id="actionTimer" min="10" max="60" step="5"></div>
                    <div class="form-group"><label class="toggle-label"><input type="checkbox" id="showStacksInBB"> Afficher les stacks en BB</label></div>
                    <div class="form-group"><label class="toggle-label"><input type="checkbox" id="autoRebuy"> Rebuy automatique (tournois)</label></div>
                    <div class="form-group"><label>Nombre de tables simultanées :</label><input type="number" id="maxTables" min="1" max="10" step="1"></div>
                </div>

                <!-- Onglet Son -->
                <div id="soundTab" class="options-tab-content">
                    <div class="form-group"><label>Son :</label><select id="soundSetting"><option value="on">Activé</option><option value="off">Désactivé</option></select></div>
                    <div class="form-group"><label>Volume général :</label><input type="range" id="soundVolume" min="0" max="1" step="0.01"></div>
                    <div class="form-group"><label class="toggle-label"><input type="checkbox" id="soundOnWin"> Son spécial victoire</label></div>
                    <div class="form-group"><label class="toggle-label"><input type="checkbox" id="soundOnChat"> Notification sonore pour chat</label></div>
                    <div class="form-group"><label class="toggle-label"><input type="checkbox" id="soundOnDeal"> Son distribution cartes</label></div>
                    <div class="form-group"><label class="toggle-label"><input type="checkbox" id="soundOnTimer"> Son timer (5 secondes)</label></div>
                    <div class="form-group"><label>Personnalisation (URL fichier MP3) :</label><input type="text" id="customSoundUrl" placeholder="https://..."></div>
                </div>

                <!-- Onglet Chat -->
                <div id="chatTab" class="options-tab-content">
                    <div class="form-group"><label class="toggle-label"><input type="checkbox" id="chatTimestamps"> Afficher l'heure des messages</label></div>
                    <div class="form-group"><label>Taille des messages :</label><select id="chatFontSize"><option value="small">Petite</option><option value="medium" selected>Moyenne</option><option value="large">Grande</option></select></div>
                    <div class="form-group"><label class="toggle-label"><input type="checkbox" id="chatNotifications"> Notifications sonores (si activé ci-dessus)</label></div>
                    <div class="form-group"><label>Ignorer les joueurs (IDs séparés par virgules) :</label><input type="text" id="chatIgnoreList" placeholder="user1,user2"></div>
                    <div class="form-group"><label>Smileys personnalisés (JSON) :</label><textarea id="customSmileys" rows="2" placeholder='{"😎":"cool","😂":"laugh"}'></textarea></div>
                </div>

                <!-- Onglet Réseau -->
                <div id="networkTab" class="options-tab-content">
                    <div class="form-group"><label>Qualité WebSocket :</label><select id="networkQuality"><option value="auto">Auto</option><option value="low">Faible (moins de trafic)</option><option value="high">Élevé (plus réactif)</option></select></div>
                    <div class="form-group"><label class="toggle-label"><input type="checkbox" id="reconnectOnDrop"> Reconnexion automatique</label></div>
                    <div class="form-group"><label>Délai de reconnexion (secondes) :</label><input type="number" id="reconnectDelay" min="1" max="30" step="1"></div>
                    <div class="form-group"><label class="toggle-label"><input type="checkbox" id="compressionData"> Compression des données (expérimental)</label></div>
                </div>

                <!-- Onglet Historique -->
                <div id="historyTab" class="options-tab-content">
                    <div class="form-group"><label>Afficher historique :</label><select id="showHistory"><option value="all">Toutes les mains</option><option value="mine">Mes mains seulement</option><option value="none">Masqué</option></select></div>
                    <div class="form-group"><label>Nombre de mains dans l'historique :</label><input type="number" id="historyMaxEntries" min="5" max="100" step="5"></div>
                    <div class="form-group"><button id="exportHistoryBtn" class="btn-small">Exporter l'historique (JSON)</button></div>
                    <div class="form-group"><button id="clearHistoryBtn" class="btn-small">Effacer l'historique local</button></div>
                    <div class="form-group"><label class="toggle-label"><input type="checkbox" id="autoSaveHistory"> Sauvegarde automatique après chaque main</label></div>
                </div>

                <!-- Onglet Admin -->
                <div id="adminTab" class="options-tab-content">
                    <div class="form-group"><label>Thème admin :</label><select id="adminThemeSelect"><option value="dark">Sombre</option><option value="light">Clair</option><option value="neon">Néon</option><option value="blue">Bleu</option><option value="red">Rouge</option></select></div>
                    <button id="saveAdminTheme" class="btn-primary">Appliquer thème</button>
                    <hr style="margin:20px 0">
                    <div class="form-group"><label>Mode maintenance :</label><button id="toggleMaintenanceBtn" class="btn-small">Basculer</button></div>
                    <div class="form-group"><label>Redémarrer toutes les tables :</label><button id="restartAllTablesBtn" class="btn-small">Redémarrer</button></div>
                    <div class="form-group"><label>Vider le cache utilisateur :</label><button id="clearUserCacheBtn" class="btn-small">Vider</button></div>
                    <div class="form-group"><label>Liste des joueurs connectés :</label><button id="listConnectedBtn" class="btn-small">Afficher</button></div>
                    <div class="form-group"><label>Configurer les limites de taux :</label><input type="text" id="rateLimitConfig" placeholder="max_requests:30, window:60"><button id="applyRateLimitBtn" class="btn-small">Appliquer</button></div>
                </div>

                <div style="margin-top: 20px; text-align: right;">
                    <button id="saveSettings" class="btn-primary">Sauvegarder toutes les options</button>
                </div>
            </div>
        </div>

        <!-- Login Modal -->
        <div id="loginModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Connexion</h2>
                <form id="loginForm">
                    <div class="form-group"><label>Pseudo :</label><input type="text" id="loginUsername" required></div>
                    <div class="form-group"><label>Mot de passe :</label><input type="password" id="loginPassword" required></div>
                    <div class="form-group"><label class="toggle-label"><input type="checkbox" id="rememberMe"> Se souvenir</label></div>
                    <button type="submit" class="btn-primary">Connexion</button>
                </form>
            </div>
        </div>

        <!-- Register Modal -->
        <div id="registerModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Inscription</h2>
                <form id="registerForm">
                    <div class="form-group"><label>Pseudo :</label><input type="text" id="regUsername" required></div>
                    <div class="form-group"><label>Email :</label><input type="email" id="regEmail"></div>
                    <div class="form-group"><label>Mot de passe :</label><input type="password" id="regPassword" required></div>
                    <button type="submit" class="btn-primary">Créer le compte</button>
                </form>
            </div>
        </div>

        <div id="toastContainer" class="toast-container"></div>
    </div>

    <script src="/js/settings_manager.js"></script>
    <script src="/js/theme_manager.js"></script>
    <script src="/js/cards.js"></script>
    <script src="/js/sound_manager.js"></script>
    <script src="/js/timer.js"></script>
    <script src="/js/hand_history.js"></script>
    <script src="/js/lobby.js"></script>
</body>
</html>
