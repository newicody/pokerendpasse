<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — PokerEndPasse</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/lobby.css">
    <style>
        .admin-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .admin-tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 2px solid var(--border-subtle); }
        .admin-tab { padding: 10px 20px; cursor: pointer; border: none; background: transparent; color: var(--text-secondary); font-family: inherit; font-size: 14px; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .admin-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
        .stat-card { background: var(--bg-tertiary); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 20px; }
        .stat-card h3 { font-size: 15px; margin-bottom: 12px; color: var(--accent); }
        .stat-value { font-size: 28px; font-weight: bold; color: var(--text-primary); font-family: 'Fira Mono', monospace; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        .data-table th, .data-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border-subtle); font-size: 13px; }
        .data-table th { color: var(--text-muted); font-weight: 600; }
        .action-btn-sm { padding: 4px 10px; font-size: 11px; border: none; border-radius: 4px; cursor: pointer; margin: 0 2px; }
        .action-btn-sm.edit { background: var(--info); color: #fff; }
        .action-btn-sm.danger { background: var(--danger); color: #fff; }
        .action-btn-sm.warn { background: var(--warning); color: #1a1a1a; }
        .action-btn-sm.success { background: var(--success); color: #fff; }
        .create-form { max-width: 500px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <header class="lobby-header" style="padding: 12px 0;">
            <div class="logo">🔧 Admin — PokerEndPasse</div>
            <nav class="header-nav">
                <a href="/lobby" class="btn-small">← Lobby</a>
            </nav>
        </header>

        <div class="admin-tabs">
            <button class="admin-tab active" data-tab="dashboard">Dashboard</button>
            <button class="admin-tab" data-tab="tournaments">Tournois</button>
            <button class="admin-tab" data-tab="users">Utilisateurs</button>
            <button class="admin-tab" data-tab="settings">Paramètres</button>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card"><h3>Joueurs actifs</h3><div id="statActivePlayers" class="stat-value">0</div></div>
                <div class="stat-card"><h3>Tables</h3><div id="statTables" class="stat-value">0</div></div>
                <div class="stat-card"><h3>Tournois</h3><div id="statTournaments" class="stat-value">0</div></div>
                <div class="stat-card"><h3>Joueurs total</h3><div id="statTotalPlayers" class="stat-value">0</div></div>
            </div>
        </div>

        <!-- Tournaments -->
        <div id="tournaments" class="tab-content">
            <h3>Créer un tournoi</h3>
            <div class="create-form">
                <div class="form-group"><label>Nom :</label><input type="text" id="tName" required></div>
                <div class="form-group"><label>Description :</label><textarea id="tDesc" rows="2"></textarea></div>
                <div class="form-group"><label>Variante :</label><select id="tVariant"><option value="holdem">Hold'em</option><option value="plo">PLO</option></select></div>
                <div class="form-group"><label>Max joueurs :</label><input type="number" id="tMax" value="100"></div>
                <div class="form-group"><label>Min pour démarrer :</label><input type="number" id="tMin" value="4"></div>
                <div class="form-group"><label>Chips de départ :</label><input type="number" id="tChips" value="10000" min="100" step="500"></div>
                <div class="form-group"><label>Dotation :</label><input type="number" id="tPrize" value="0"></div>
                <div class="form-group"><label>ITM % :</label><input type="number" id="tItm" value="10" step="1"></div>
                <div class="form-group"><label>Début inscriptions :</label><input type="datetime-local" id="tRegStart"></div>
                <div class="form-group"><label>Fin inscriptions :</label><input type="datetime-local" id="tRegEnd"></div>
                <div class="form-group"><label>Début tournoi :</label><input type="datetime-local" id="tStart"></div>
                <button class="btn-primary" onclick="createTournament()">Créer</button>
            </div>

            <h3 style="margin-top: 30px;">Tournois existants</h3>
            <div id="adminTournamentsList"></div>
        </div>

        <!-- Users -->
        <div id="users" class="tab-content">
            <h3>Utilisateurs</h3>
            <table class="data-table" id="usersTable">
                <thead><tr><th>Pseudo</th><th>Email</th><th>Admin</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Settings -->
        <div id="settings" class="tab-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>🎨 Apparence</h3>
                    <div class="form-group"><label>Thème :</label><select id="adminTheme"><option value="dark">Sombre</option><option value="light">Clair</option><option value="neon">Néon</option><option value="blue">Bleu</option><option value="red">Rouge</option></select></div>
                    <button class="btn-primary" onclick="saveAppearance()">Sauvegarder</button>
                </div>
            </div>
        </div>

    </div>

    <script src="/js/admin.js"></script>
</body>
</html>
